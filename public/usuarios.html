<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<script>

if(!localStorage.getItem("token")){
alert("Faça login")
window.location="/login.html"
}

</script>

<title>DocAI • Usuários</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h3>Gerenciamento de Usuários</h3>

<table class="table table-bordered mt-3">

<thead>
<tr>
<th>ID</th>
<th>Usuário</th>
<th>Nome</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="listaUsuarios"></tbody>

</table>

</div>

<script>

const usuario = localStorage.getItem("usuario_nome")

if(usuario !== "KELVIS"){

alert("Acesso restrito")

window.location="/index.html"

}
async function carregarUsuarios(){

const resp = await fetch("/usuarios")

const dados = await resp.json()

const tabela = document.getElementById("listaUsuarios")

tabela.innerHTML=""

dados.forEach(u=>{

tabela.innerHTML += `
<tr>

<td>${u.ID}</td>
<td>${u.USUARIO}</td>
<td>${u.NOME}</td>

<td>

<button class="btn btn-warning btn-sm"
onclick="resetarSenha('${u.USUARIO}')">

Resetar Senha

</button>

</td>

</tr>
`

})

}

async function resetarSenha(usuario){

const novaSenha = prompt("Digite nova senha")

if(!novaSenha) return

await fetch("/resetar_senha",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

usuario,
senha:novaSenha

})

})

alert("Senha alterada")

carregarUsuarios()

}

carregarUsuarios()

</script>

</body>
</html>
