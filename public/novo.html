<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Atendimento - DocAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .list-group-item-action { cursor: pointer; }
        #listaClientesNovo { z-index: 1000; }
        .bg-custom { background-color: #f8f9fa; }
    </style>
</head>

<body class="bg-custom">
    <div class="container mt-5 shadow-sm p-4 bg-white rounded">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="text-primary">Novo Atendimento</h2>
            <a href="index.html" class="btn btn-outline-secondary">Voltar ao Início</a>
        </div>
        <hr>

        <h5 class="mb-3 text-secondary">Dados do Cliente</h5>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Código Cliente</label>
                <input type="number" id="codCliente" class="form-control" placeholder="Ex: 105" onblur="verificarCliente()">
                <div id="feedbackCliente" class="form-text">Digite o código para validar.</div>
            </div>

            <div class="col-md-8 mb-3 position-relative">
                <label class="form-label fw-bold">Nome Cliente</label>
                <input id="clienteNovo" class="form-control" placeholder="Nome será preenchido ou digitado" oninput="autocompleteClienteNovo()">
                <div id="listaClientesNovo" class="list-group position-absolute w-100 shadow-sm"></div>
            </div>
        </div>

        <hr>

        <h5 class="mb-3 text-secondary">Detalhes do Atendimento</h5>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Nº Atendimento (ERP)</label>
                <input type="number" id="codAtendimento" class="form-control" placeholder="Ex: 55420">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Responsável</label>
                <input id="responsavel" class="form-control" value="Kelvis">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Status</label>
                <select id="status" class="form-control">
                    <option value="FINALIZADO">FINALIZADO</option>
                    <option value="PENDENTE">PENDENTE</option>
                </select>
            </div>
        </div>

        <hr>

        <h5 class="mb-3 text-secondary">Relato Técnico</h5>
        <div class="mb-3">
            <label class="form-label fw-bold">Problema Relatado</label>
            <textarea id="problema" class="form-control" rows="3" placeholder="O que o cliente reportou?"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Causa Raiz</label>
            <textarea id="causa" class="form-control" rows="3" placeholder="Qual a origem da falha?"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Solução Aplicada</label>
            <textarea id="solucao" class="form-control" rows="3" placeholder="Passo a passo da resolução."></textarea>
        </div>

        <div class="mt-4">
            <button class="btn btn-success btn-lg w-100" onclick="gerarRelatorio()">
                Gravar no Banco e Gerar Documento
            </button>
        </div>
    </div>

    <script src="js/novo.js"></script>
</body>

</html>
