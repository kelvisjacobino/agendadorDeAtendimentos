<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">

<script>

document.addEventListener("DOMContentLoaded",()=>{

const usuario = localStorage.getItem("usuario_nome")

if(!usuario){

window.location="/login.html"
return

}

const campo = document.getElementById("usuarioLogado")

if(campo){
campo.innerText = usuario
}

})

function logout(){

localStorage.removeItem("token")
localStorage.removeItem("usuario_nome")

window.location="/login.html"

}

</script>


<script>

if(!localStorage.getItem("token")){
alert("Você precisa fazer login")
window.location="/login.html"
}

</script>
<title>DocAI - Novo Atendimento</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI,Arial;
}

.top-bar{
background:#1f2d3d;
color:white;
padding:12px 20px;
font-size:18px;
font-weight:600;
}

.container-card{
max-width:900px;
margin:auto;
margin-top:30px;
}

.card{
border:none;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.section-title{
font-size:14px;
font-weight:600;
color:#6c757d;
margin-top:15px;
}

textarea{
resize:none;
}

.btn-primary{
background:#0069d9;
border:none;
}

.btn-primary:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div style="text-align:right;font-size:14px;margin-bottom:10px;">
👤 <b id="usuarioLogado"></b>
<button class="btn btn-sm btn-outline-danger ms-2" onclick="logout()">Sair</button>
</div>
<div class="top-bar">
DocAI • Registro de Atendimento
</div>

<div class="container container-card">

<div class="card">
<div class="card-body">

<div class="d-flex justify-content-between mb-4">

<h4>Novo Atendimento</h4>

<button class="btn btn-outline-secondary btn-sm" onclick="history.back()">
⬅ Voltar
</button>

</div>

<!-- CLIENTE -->

<div class="row g-3">

<div class="col-md-3">
<label class="form-label">Código Cliente</label>
<input id="codCliente" class="form-control">
</div>

<div class="col-md-9">
<label class="form-label">Cliente</label>
<input id="clienteNovo" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Código Atendimento</label>
<input id="codAtendimento" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Responsável</label>
<input id="responsavel" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Status</label>
<select id="status" class="form-select">
<option>Resolvido</option>
<option>Em análise</option>
<option>Pendente</option>
</select>
</div>

</div>

<hr>

<div class="section-title">Problema</div>

<textarea id="problema" class="form-control" rows="3"></textarea>
<div id="sugestaoIA" class="alert alert-info mt-2" style="display:none">
💡 Sugestão de solução baseada em atendimentos anteriores:
<div id="textoSugestao"></div>
<div id="sugestaoIA" style="display:none">
<div id="textoSugestao"></div>
</div>
<button class="btn btn-sm btn-success mt-2" onclick="usarSugestao()">
Usar esta solução
</button>
</div>

<div class="section-title">Causa</div>

<textarea id="causa" class="form-control" rows="3"></textarea>

<div class="section-title">Solução</div>

<textarea id="solucao" class="form-control" rows="3"></textarea>

<div class="d-flex justify-content-end mt-4">

<button class="btn btn-primary px-4" onclick="gerarRelatorio()">
Salvar Atendimento
</button>

</div>

</div>
</div>

</div>

<script src="novo.js"></script>




</body>
</html>
