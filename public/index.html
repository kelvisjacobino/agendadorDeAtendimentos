<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>DocAI - Central de Suporte Inteligente</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI,Arial;
}

.top-bar{
background:#1f2d3d;
color:white;
padding:12px 20px;
font-size:20px;
font-weight:600;
}

.container-main{
max-width:1000px;
margin:auto;
margin-top:30px;
}

.card{
border:none;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.resultado-card{
border-left:4px solid #0d6efd;
}

</style>

</head>

<body>

<div class="top-bar">
DocAI • Central Inteligente de Atendimentos
</div>

<div class="container container-main">

<!-- AÇÕES -->

<div class="card mb-4">
<div class="card-body">

<div class="d-flex justify-content-between">

<h5>Ações</h5>

<a href="novo.html" class="btn btn-primary">
Novo Atendimento
</a>

</div>

</div>
</div>


<!-- BUSCA -->

<div class="card mb-4">
<div class="card-body">

<h5>Buscar Atendimento</h5>

<div class="input-group">

<input id="termoBusca" class="form-control"
placeholder="Digite problema, cliente ou código">

<button class="btn btn-primary" onclick="buscar()">
Buscar
</button>

</div>

<div id="resultado" class="mt-4"></div>

</div>
</div>


<!-- ASSISTENTE IA -->

<div class="card mt-4">
<div class="card-body">

<h5>Assistente Técnico DocAI</h5>

<div id="chatBox" style="
height:300px;
overflow-y:auto;
background:#f8f9fa;
padding:10px;
border-radius:8px;
margin-bottom:10px;
"></div>

<div class="input-group">

<input id="perguntaIA" class="form-control"
placeholder="Pergunte algo... ex: nota fiscal não valida">

<button onclick="perguntarIA()" class="btn btn-success">
Enviar
</button>

</div>

</div>
</div>

<script src="js/app.js"></script>

</body>
</html>
