<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>DocAI • Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="card p-4">

<div class="title">DocAI</div>
<div class="subtitle">Central Inteligente</div>

<!-- LOGIN -->

<div id="loginBox">

<input id="usuario" class="form-control mb-2" placeholder="Usuário">

<input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

<button class="btn btn-primary w-100" onclick="login()">
Entrar
</button>

<div class="link" onclick="mostrarCadastro()">
Criar nova conta
</div>

</div>


<!-- CADASTRO -->

<div id="cadastroBox" style="display:none">

<input id="novoUsuario" class="form-control mb-2" placeholder="Usuário">

<input id="nomeUsuario" class="form-control mb-2" placeholder="Nome">

<input id="novaSenha" type="password" class="form-control mb-3" placeholder="Senha">

<button class="btn btn-success w-100" onclick="cadastrar()">
Cadastrar
</button>

<div class="link" onclick="mostrarLogin()">
Voltar para login
</div>

</div>

</div>


<script>

/* ENTER PARA LOGIN */

document.addEventListener("keypress",(e)=>{

if(e.key==="Enter"){

login()

}

})


function mostrarCadastro(){

document.getElementById("loginBox").style.display="none"
document.getElementById("cadastroBox").style.display="block"

}

function mostrarLogin(){

document.getElementById("cadastroBox").style.display="none"
document.getElementById("loginBox").style.display="block"

}


/* LOGIN */

async function login(){

const usuario=document.getElementById("usuario").value
const senha=document.getElementById("senha").value

console.log("[AUTH] Tentando login:",usuario)

try{

const resp=await fetch("/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usuario,senha})

})

const data=await resp.json()

if(data.token){

console.log("[AUTH] Login OK")

localStorage.setItem("token",data.token)
localStorage.setItem("usuario_nome",data.nome)

window.location="/index.html"

}else{

alert("Usuário ou senha inválido")

}

}catch(err){

console.error("[AUTH ERROR]",err)
alert("Erro ao conectar com servidor")

}

}


/* CADASTRO */

async function cadastrar(){

const usuario=document.getElementById("novoUsuario").value
const nome=document.getElementById("nomeUsuario").value
const senha=document.getElementById("novaSenha").value

try{

const resp=await fetch("/criar_usuario",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usuario,nome,senha})

})

const data=await resp.json()

if(data.ok){

alert("Usuário criado com sucesso")

mostrarLogin()

}else{

alert("Erro ao criar usuário")

}

}catch(err){

console.error(err)
alert("Erro ao cadastrar")

}

}

</script>

</body>
</html>
