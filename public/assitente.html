<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Assistente IA</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/docai.css">
</head>
<body>

<div class="sidebar">
<h2>DocAI</h2>
<a href="index.html">📊 Dashboard</a>
<div class="menu-item" onclick="toggleMenu('menuIA')">🤖 Inteligência</div>
<div id="menuIA" class="submenu">
<a href="/assitente.html">💬 Assistente IA</a>
<a href="base.html">📚 Base de Conhecimento</a>
<a href="insights.html">📈 Insights da IA</a>
</div>
</div>

<div class="main">
<div class="topbar">
<h4>Assistente Inteligente</h4>
</div>

<div id="chat" class="chat card p-3">
<div class="msg ai">Olá 👋<br>Sou seu assistente de suporte.<br>Digite um erro ou problema.</div>
</div>

<div class="input-area mt-2 d-flex">
<input id="pergunta" class="form-control me-2" placeholder="Digite o erro ou pergunta..." />
<button class="btn btn-success" onclick="enviarPergunta()">Enviar</button>
</div>
</div>

<script>
async function enviarPergunta(){
 const input = document.getElementById("pergunta")
 const texto = input.value
 if(!texto) return
 adicionarMensagem(texto,"user")
 input.value=""
 const resp = await fetch("/api/ai/copiloto",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({pergunta:texto})
 })
 const data = await resp.json()
 adicionarMensagem(data.resposta,"ai")
 if(data.origem==="ATENDIMENTOS") adicionarMensagem("📚 Baseado em atendimentos anteriores","info")
 if(data.origem==="IA") adicionarMensagem("🤖 Resposta gerada pela IA","info")
}
function adicionarMensagem(texto,tipo){
 const chat = document.getElementById("chat")
 const div = document.createElement("div")
 div.className="msg "+tipo
 div.innerHTML = texto
 chat.appendChild(div)
 chat.scrollTop = chat.scrollHeight
}
/* enviar enter */
document.getElementById("pergunta").addEventListener("keydown", function(e){
 if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); enviarPergunta() }
})
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
