<!DOCTYPE html>
<html>
<head>

<title>Admin - Usuários</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="container mt-5">

<h3>Painel de Usuários</h3>

<hr>

<div class="row">

<div class="col">

<input id="usuario" class="form-control mb-2" placeholder="Usuario">

<input id="nome" class="form-control mb-2" placeholder="Nome">

<input id="senha" type="password" class="form-control mb-2" placeholder="Senha">

<button onclick="criar()" class="btn btn-success">
Criar Usuário
</button>

</div>

</div>

<hr>

<div id="lista"></div>

<script>

async function criar(){

const usuario=document.getElementById("usuario").value
const nome=document.getElementById("nome").value
const senha=document.getElementById("senha").value

const resp=await fetch("/criar_usuario",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({usuario,nome,senha})

})

const data=await resp.json()

if(data.ok){

alert("Usuário criado")

}

}

</script>

</body>
</html>
